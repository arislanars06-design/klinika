{% if matches %}
<ul class="absolute left-0 right-0 top-full z-30 mt-1 max-h-72 overflow-auto rounded-lg border bg-white shadow-lg">
  {% for p in matches %}
  <li>
    <button type="button" @click='pickPatient({{ p.id }}, "{{ p.full_name|e }}", {{ p.birth_year }})'
      class="flex w-full items-start justify-between gap-3 px-3 py-2 text-left hover:bg-brand-50">
      <span><span class="font-medium">{{ p.full_name }}</span> <span class="text-slate-500">— {{ p.birth_year }}</span></span>
      <span class="text-xs text-slate-400">{{ p.phone or '' }}</span>
    </button>
  </li>
  {% endfor %}
</ul>
{% elif q and q|length >= 2 %}
<div class="absolute left-0 right-0 top-full z-30 mt-1 rounded-lg border bg-white p-3 text-sm text-slate-500 shadow-lg">— —</div>
{% endif %}
