<!doctype html>
<html lang="{{ lang }}" class="h-full bg-slate-50">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ 'app.title' | t(lang) }}{% endblock %}</title>

    <!-- Tailwind (CDN Play build; vendored in production) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50:  '#eff6ff',
                500: '#2563eb',
                600: '#1d4ed8',
                700: '#1e40af',
              },
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>

    <!-- HTMX + Alpine.js -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.13.5"></script>

    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}" />
    {% block head %}{% endblock %}
  </head>
  <body class="h-full text-slate-800 antialiased">
    {% block header %}
    <header class="border-b bg-white">
      <div class="mx-auto flex max-w-6xl items-center gap-4 px-6 py-4">
        <a href="/" class="flex items-center gap-2 text-lg font-semibold text-slate-900">
          <span class="text-2xl">🏥</span>
          <span>{{ clinic_name or ('app.title' | t(lang)) }}</span>
        </a>
        <span class="hidden text-sm text-slate-500 md:inline">
          {{ 'app.subtitle' | t(lang) }}
        </span>
        <nav class="ms-auto flex items-center gap-2">
          {% include 'partials/lang_switcher.html' %}
        </nav>
      </div>
    </header>
    {% endblock %}

    <main class="mx-auto max-w-6xl px-6 py-8">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t bg-white py-4 text-center text-xs text-slate-400">
      Klinika LOR v0.1.0 • {{ 'app.subtitle' | t(lang) }}
    </footer>
  </body>
</html>
