{# First-run language chooser. Bypasses the app shell to feel like a splash screen. #}
<!doctype html>
<html lang="{{ lang }}" class="h-full bg-gradient-to-br from-brand-50 to-slate-100">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Klinika LOR / Клиника ЛОР</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>
  <body class="flex h-full items-center justify-center">
    <div class="w-full max-w-xl rounded-2xl bg-white p-10 shadow-xl">
      <div class="text-center">
        <div class="text-5xl">🏥</div>
        <h1 class="mt-3 text-2xl font-bold text-slate-900">Klinika LOR / Клиника ЛОР</h1>
        <p class="mt-2 text-slate-500">Tilni tanlang / Выберите язык</p>
      </div>

      <div class="mt-10 grid grid-cols-2 gap-4">
        <button
          type="button"
          hx-post="/language/uz"
          hx-swap="none"
          class="flex flex-col items-center gap-2 rounded-xl border-2 border-slate-200 p-6 text-lg font-semibold transition hover:border-brand-500 hover:bg-brand-50"
        >
          <span class="text-3xl">🇺🇿</span>
          <span>O'ZBEKCHA</span>
        </button>

        <button
          type="button"
          hx-post="/language/ru"
          hx-swap="none"
          class="flex flex-col items-center gap-2 rounded-xl border-2 border-slate-200 p-6 text-lg font-semibold transition hover:border-brand-500 hover:bg-brand-50"
        >
          <span class="text-3xl">🇷🇺</span>
          <span>РУССКИЙ</span>
        </button>
      </div>
    </div>
  </body>
</html>
