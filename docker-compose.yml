services:
  web:
    build: .
    image: clinic-lor-web:latest
    container_name: clinic-web
    restart: unless-stopped
    # Bind to 127.0.0.1 by default — put nginx (or the LAN-facing tunnel)
    # in front. Change to "8000:8000" for direct LAN exposure.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # ---- REQUIRED in production — set these to strong random values ----
      CLINIC_WEB_PASSWORD: "${CLINIC_WEB_PASSWORD:-changeme}"
      CLINIC_WEB_SECRET:   "${CLINIC_WEB_SECRET:-CHANGE-ME-32-random-bytes}"
      # ---- Optional overrides ---------------------------------------------
      CLINIC_WEB_HOST:           "0.0.0.0"
      CLINIC_WEB_PORT:           "8000"
      CLINIC_WEB_SESSION_MAX_AGE: "43200"
    volumes:
      # Persist the SQLite database, daily backups, and user Word templates.
      - clinic_data:/data
      - ./templates:/app/templates:ro
    # Reasonable resource limits — SQLite + a handful of workers is tiny.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"

  # Optional TLS reverse proxy. Uncomment when deploying to the public
  # internet with a real domain name.
  #
  # nginx:
  #   image: nginx:1.27-alpine
  #   container_name: clinic-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./deploy/certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - web

volumes:
  clinic_data:
