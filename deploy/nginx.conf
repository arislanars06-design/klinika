# Sample nginx reverse-proxy for Clinic LOR web.
#
# Copy this file to /etc/nginx/nginx.conf on the host (or mount it into the
# nginx container per ``docker-compose.yml``). Replace ``clinic.example.com``
# with your real domain and drop the appropriate certificates into
# ``/etc/nginx/certs/`` (or wherever the volume is mounted).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Extra headers common to both blocks.
    map $sent_http_content_type $charset {
        default off;
        ~text/  utf-8;
    }

    # ---- HTTP → HTTPS redirect --------------------------------------------
    server {
        listen 80;
        server_name clinic.example.com;
        return 301 https://$host$request_uri;
    }

    # ---- HTTPS terminating proxy ------------------------------------------
    server {
        listen 443 ssl http2;
        server_name clinic.example.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "same-origin" always;

        location / {
            proxy_pass         http://web:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Static files served directly from the app; long-cache them.
        location /static/ {
            proxy_pass         http://web:8000/static/;
            proxy_set_header   Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
